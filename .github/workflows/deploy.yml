name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write
  security-events: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v6
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}

  tests:
    needs: install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore node_modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}

      - name: Execute tests
        run: mkdir -p dist/reports && npm run test:coverage 2>&1 | tee dist/reports/coverage.txt

      - name: Extract coverage percentage
        run: cat dist/reports/coverage.txt | awk '/All files/ {print $4}' > dist/reports/coveragePercentage.txt

      - name: Upload tests results
        uses: actions/upload-artifact@v6
        with:
          name: results
          path: ./dist

  semgrep:
    needs: tests
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download test results
        uses: actions/download-artifact@v8
        with:
          name: results
          path: ./dist

      - name: Run Semgrep for SARIF output
        run: semgrep scan --config auto --sarif src/ --output dist/reports/semgrep.sarif

      - name: Run Semgrep for JSON output
        run: semgrep scan --config auto --json src/ --output dist/reports/semgrep.json

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dist/reports/semgrep.sarif

      - name: Upload semgrep results
        uses: actions/upload-artifact@v6
        with:
          name: results
          path: ./dist

  quality:
    needs: semgrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore node_modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}

      - name: Download semgrep results
        uses: actions/download-artifact@v8
        with:
          name: results
          path: ./dist

      - name: Execute lint
        run: npm run lintOnFile

      - name: Execute typecheck
        run: npm run typecheck

      - name: Create badges
        run: node meta/scripts/generate-badge.js

      - name: Upload quality results
        uses: actions/upload-artifact@v6
        with:
          name: results
          path: ./dist

  build:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore node_modules
        uses: actions/cache/restore@v6
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}

      - name: Build
        run: npm run build

      - name: Download quality results
        uses: actions/download-artifact@v8
        with:
          name: results
          path: ./dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5