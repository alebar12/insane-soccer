<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="css/style.css?cache=@timestamp@">
		<link rel="shortcut icon" href="favicon.png" type="image/x-icon">
		<link rel="icon" href="favicon.png" type="image/x-icon">
        <title>InsaneSoccer - HTML5 Game by Alessio Barducci</title>
		<meta name="description" content="An exciting and insane HTML5 soccer game. Realized by Alessio Barducci">
		<meta name="keywords" content="html, html5, game, flash, soccer, insane, alessio, barducci, canvas, online, play, javascript">
		 <meta name="author" content="Alessio Barducci">
		<META NAME="ROBOTS" CONTENT="INDEX, FOLLOW">
    </head>
    <body>	
		<div id="loadingDiv" class="fade-element">Loading...</div>
		<div id="header">
			<img id="titleImage" src="images/title.png" alt="Insane Soccer title"/>
			<canvas id="scoreCanvas" width="800" height="80"></canvas>
		</div>
        <div id="canvas-container">
			<canvas id="backgroundCanvas" class="gameCanvas" width="800" height="550"></canvas>
			<canvas id="gameCanvas" class="gameCanvas" width="800" height="550"></canvas>
			<canvas id="effectsCanvas" class="gameCanvas" width="800" height="550"></canvas>
			<canvas id="menuCanvas" class="gameCanvas" width="800" height="550"></canvas>
			<div id="formDiv">
				<form id="goalForm" onsubmit="return false;">
					Number of goals:<br/>
					<input type="text" name="goals" value="10" id="goals"><br/>
					<button type="submit" onclick="startGame();">GO!</button>
				</form>
			</div>
		</div>
		<div id="credits">
			Developed by <a href="http://alessiobarducci.altervista.org" target="_blank">Alessio Barducci</a>
		</div>

		<script src="js/game.js?cache=@timestamp@"></script>
    </body>
</html>
